name: Refresh live data & deploy

# Hourly: pull the latest openfootball World Cup 2026 results (free, no key),
# rebuild, and publish to gh-pages. Standings, results and the knockout bracket
# auto-update; player props are curated.
#
# NOTE: GitHub only fires `schedule` for workflows on the DEFAULT branch (main).
# This job checks out the app source branch explicitly, so it builds the right
# code wherever the workflow file lives.

on:
  schedule:
    - cron: '0 * * * *'        # every hour
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-deploy
  cancel-in-progress: true

env:
  SOURCE_BRANCH: claude/mobile-ui-colors-actions-ktdtz3

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Refresh live data (openfootball)
        run: npm run refresh
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      # Persist the refreshed data back to the source branch so the live feed
      # survives manual deploys (and completed matches stay dropped). Commits
      # only when real data changed, not just the timestamp.
      - name: Persist refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=$(git diff -U0 src/data.json | grep -E '^[+-][^+-]' | grep -vE '"updated"|"fetched"|"source"' || true)
          if [ -n "$changed" ]; then
            git commit -am "data: hourly auto-refresh [skip ci]"
            git push origin HEAD:${{ env.SOURCE_BRANCH }}
          else
            echo "No meaningful data change; skipping persist."
          fi
