name: Refresh live data & deploy

# Hourly: pull latest openfootball results (free, no key) + bake API-Football
# foul/shot props server-side (only if the API_FOOTBALL_KEY secret is set),
# rebuild, and publish to gh-pages. The browser makes NO API calls.
#
# NOTE: GitHub only fires `schedule` for workflows on the DEFAULT branch (main).
# This job checks out the app source branch explicitly, so it builds the right
# code wherever the workflow file lives.

on:
  schedule:
    - cron: '0 * * * *'        # every hour (≤24 squad-fetch days; cached so most runs make 0 API calls)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-deploy
  cancel-in-progress: true

env:
  SOURCE_BRANCH: claude/mobile-ui-colors-actions-ktdtz3

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Persist the API-Football squad cache across runs so each upcoming team
      # is fetched ~once a day (most hourly runs then make ZERO API calls).
      - name: Restore API-Football cache
        uses: actions/cache@v4
        with:
          path: data/af-cache.json
          key: af-cache-${{ github.run_id }}
          restore-keys: af-cache-

      - name: Install deps
        run: npm ci

      - name: Refresh live data (openfootball + API-Football)
        run: npm run refresh
        env:
          # Set the repo SECRET API_FOOTBALL_KEY (free tier) to activate live
          # foul/shot props. Empty → curated props, zero API calls.
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          AF_BUDGET: '40'          # hard cap on API calls per run (free tier = 100/day)

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
