const AI_CTX={};
Object.values(DAYS).forEach(d=>{d.matches.forEach(m=>{AI_CTX[m.id]=m.ai})});

function cc(p){return p>=75?'var(--ac)':p>=55?'var(--amb)':'var(--red)'}
function cf(p){return p>=75?'f-hi':p>=55?'f-md':'f-lo'}
function cpill(p){return p>=75?'cp-hi':p>=55?'cp-md':'cp-lo'}

function buildNav(){
  const nav=document.getElementById('dateNav');
  nav.innerHTML=DATES.map(d=>`
    <button class="dn-btn" data-key="${d.key}" onclick="loadDay('${d.key}',this)">
      ${d.hot?'<span class="hot-dot"></span>':''}
      <span class="dn-day">${d.day}</span>
      <span class="dn-num">${d.num}</span>
      <span class="dn-cnt">${d.r32?'R32 begins':d.matches+' matches'}</span>
    </button>`).join('');
}

function loadDay(key,btn){
  document.querySelectorAll('.dn-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const day=DAYS[key];
  const pg=document.getElementById('pageContent');
  if(!day){
    pg.innerHTML=`<div class="no-matches"><div class="no-icon">📅</div><p>Predictions loading for this date — check back soon</p></div>`;
    return;
  }
  pg.innerHTML=`
    <div class="day-hdr">
      <div class="day-title">${day.title}</div>
      <div class="day-sub">${day.sub}</div>
    </div>
    <div class="matches">${day.matches.map(buildCard).join('')}</div>`;
}

function buildCard(m){

<div class="mcard${m.live?' live':''}" id="mc_${m.id}" onclick="toggleCard('${m.id}')">

    </div>
  </div>
  <div class="mc-body">
    <div class="pred-grid">

      <div class="psec">
        <div class="psec-title">🏆 Result prediction</div>
        <div class="result-boxes">
          <div class="rbox${m.winner===m.hT?' winner':''}">
            <div class="rbox-team">${m.hT}</div><div class="rbox-odds">${m.odds.h}</div><div class="rbox-pct">${m.wP}%</div>

      </div>

      <div class="pred-full">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div class="parlay-box">
              <div class="pl-head">⚡ Parlay builder</div>
              ${m.parlay.map((p,i)=>`<div class="pl-leg"><span class="pl-num">${i+1}</span><span class="pl-pick">${p.p}</span><span class="pl-odds">${p.o}</span></div>`).join('')}
              <div class="pl-return">Est. combined return: <span>${m.pret}</span></div>
            </div>
            ${m.upsetNote?`<div class="upset-box">⚠ ${m.upsetNote}</div>`:''}
            ${m.ref?`<div class="ref-box">${m.ref}</div>`:''}
          </div>
          <div class="ai-section">
            <div class="ai-row">
              <span class="ai-label">🤖 AI deep analysis</span>
              <button class="ai-btn" onclick="event.stopPropagation();runAI('${m.id}')">Analyse ↗</button>
            </div>
            <div class="ai-result" id="aio_${m.id}">Click for foul + SOT + corners + throw-ins + live trigger + risk flag</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>`;
}

function toggleCard(id){document.getElementById('mc_'+id).classList.toggle('open')}

async function runAI(id){
  const el=document.getElementById('aio_'+id);
  if(!el)return;
  el.innerHTML='<div class="ld"><span></span><span></span><span></span></div> Analysing…';
  el.classList.add('active');
  const ctx=AI_CTX[id]||'World Cup 2026 match';
  const p=`WC 2026 betting analyst. Tournament averages: 24.4 fouls/game, 10.6 corners/game, 46 throw-ins/game, 3.14 goals/game, fav win rate 54%, upset rate 46%.\n\nContext: ${ctx}\n\nProvide in bullet format:\n• FOUL PROP: best player, bet, confidence %, 1-sentence reason\n• SOT PROP: best player, bet, confidence %, 1-sentence reason\n• CORNER BET: specific prop, confidence %\n• THROW-IN BET: specific prop, confidence %\n• LIVE TRIGGER: what to watch in first 20 mins\n• RISK: biggest upset risk factor\n\nMax 180 words. No disclaimers.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:450,messages:[{role:'user',content:p}]})});
    const d=await r.json();
    const t=d.content?.find(b=>b.type==='text')?.text||'Unable to generate.';
    el.innerHTML=t.replace(/\n/g,'<br>');
  }catch(e){el.innerHTML='Analysis unavailable — check connection.'}
}

// ── INIT ──
buildNav();

if(todayBtn){todayBtn.classList.add('active');loadDay('23',null)}
